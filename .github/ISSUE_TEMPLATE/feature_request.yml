name: Feature request
description: Suggest a new capability or improvement
title: "[feat]: "
labels: ["type: feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement to Agentbase.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve? What are you trying to do that you cannot do today?
      placeholder: "I want to bind a single source to multiple libraries with different chunking settings, but chunking is configured per source."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Rough ideas are fine.
      placeholder: "Allow chunking overrides at the library-source binding level."
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples from other tools, or anything else that helps explain the request.
    validations:
      required: false
