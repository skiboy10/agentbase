# Agentbase Frontend nginx Configuration
#
# Handles:
# - SPA routing (React Router)
# - API proxy to backend
# - Proxy header forwarding for reverse proxies (Cloudflare Tunnel, etc.)
#
# Security: External traffic (via Cloudflare tunnel) is protected at the
# backend layer by is_external_request() — CRUD writes blocked, responses
# redacted, rate limiting, API key required for invoke. See
# the 2026-02 security hardening review for full details.

# Map to preserve X-Forwarded-Proto from upstream proxies (Cloudflare Tunnel)
# Falls back to $scheme for direct access
map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 250M;

    # Use Docker's embedded DNS resolver and re-resolve every 10s so that a
    # recreated backend container (which gets a new IP) is picked up
    # automatically. Without this, nginx caches the upstream IP at startup
    # and 502s indefinitely after a backend rebuild/restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api {
        # Variable upstream forces nginx to honor the resolver TTL above
        # instead of caching the IP once at config-load.
        # Project-unique alias declared in docker-compose.yml. The default
        # service alias `backend` collides with sibling compose stacks
        # (e.g. another compose stack) that join the same network — Docker
        # DNS would round-robin between them, causing intermittent 502s.
        set $backend_upstream "agentbase-backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Shared-secret gate (#49): tells the backend that XFF / XFP came
        # from a trusted proxy. The literal placeholder is replaced at
        # container start by /docker-entrypoint.d/30-substitute-forward-secret.sh.
        # If INTERNAL_FORWARD_SECRET is unset, that script removes this
        # line entirely so the backend ignores the X-Forwarded-* headers.
        proxy_set_header X-Internal-Forward-Secret "@@INTERNAL_FORWARD_SECRET@@";

        # Use mapped value that preserves upstream X-Forwarded-Proto
        # This is critical for HTTPS behind reverse proxies (Cloudflare, etc.)
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        # Rewrite backend URLs in redirects to relative paths
        proxy_redirect http://backend:8000/ /;

        # Extended timeouts for long-running requests (SSE streaming, etc.)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # MCP server proxy to backend (FastMCP streamable HTTP transport)
    # Mounted at /mcp in backend/app/main.py
    location /mcp {
        # Project-unique alias declared in docker-compose.yml. The default
        # service alias `backend` collides with sibling compose stacks
        # (e.g. another compose stack) that join the same network — Docker
        # DNS would round-robin between them, causing intermittent 502s.
        set $backend_upstream "agentbase-backend:8000";
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;

        # Standard proxy headers
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Shared-secret gate (#49): tells the backend that XFF / XFP came
        # from a trusted proxy. The literal placeholder is replaced at
        # container start by /docker-entrypoint.d/30-substitute-forward-secret.sh.
        # If INTERNAL_FORWARD_SECRET is unset, that script removes this
        # line entirely so the backend ignores the X-Forwarded-* headers.
        proxy_set_header X-Internal-Forward-Secret "@@INTERNAL_FORWARD_SECRET@@";
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;

        # Streamable HTTP transport: disable buffering so server-sent events
        # flush to the client immediately. Long-lived sessions need long timeouts.
        proxy_buffering off;
        proxy_cache off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }
}
