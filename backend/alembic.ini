# Alembic Configuration

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# Template used for new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path prepended with this for 'env.py'
prepend_sys_path = .

# Timezone for revision timestamps
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during migration generation
# revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# sourceless = false

# Version path separator ('/' on POSIX, 'os' for OS-specific)
# version_path_separator = os

# Output encoding
# output_encoding = utf-8

# Database URL is read from environment in env.py, not from this file.
# This placeholder is required by Alembic but not used.
sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# Uncomment to run black on generated migrations:
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 100 REVISION_SCRIPT_FILENAME


# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
